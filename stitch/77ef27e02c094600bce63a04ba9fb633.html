<!DOCTYPE html>

<style>
        body { background-color: #0F172A; } /* Layer 0 Background Override for Brand Alignment */
        .card-surface { background-color: #1E293B; } /* Layer 1 Surface */
        .card-border { border-color: #334155; border-width: 1px; border-style: solid; }
        .input-surface { background-color: #0F172A; border-color: #334155; }
        .input-focus:focus-within { border-color: theme('colors.primary'); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.5); }
    </style>
</head>
<body class="text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopNavBar (Nav Shell Suppressed due to Transactional/Form Page intent - However, providing a simplified header for context as per typical CRUD forms returning to a main state, but strictly adhering to rules, suppressing global nav for task focus. Instead using a localized header.) -->
<!-- Main Content Canvas -->
<main class="flex-1 flex justify-center items-start pt-xl pb-xl px-margin-mobile md:px-margin-desktop">
<div class="w-full max-w-3xl card-surface card-border rounded-lg shadow-none overflow-hidden flex flex-col">
<!-- Form Header -->
<div class="px-lg py-md border-b card-border flex items-center justify-between">
<div>
<h1 class="font-headline-md text-headline-md text-on-surface">Edit Record</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-unit">Update operational data entry details.</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none focus:ring-2 focus:ring-primary-container rounded-DEFAULT p-unit" type="button">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Form Body -->
<form class="p-lg flex flex-col gap-lg">
<!-- Title Field -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="record-title">Title</label>
<div class="input-focus rounded-DEFAULT flex items-center px-md py-sm input-surface transition-all duration-200">
<input class="bg-transparent border-none outline-none w-full font-body-md text-body-md text-on-surface placeholder-on-surface-variant focus:ring-0 p-0" id="record-title" name="record-title" placeholder="Enter title" type="text" value="Quarterly Compliance Audit"/>
</div>
</div>
<!-- Description Field -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="record-description">Description</label>
<div class="input-focus rounded-DEFAULT flex items-start px-md py-sm input-surface transition-all duration-200">
<textarea class="bg-transparent border-none outline-none w-full font-body-md text-body-md text-on-surface placeholder-on-surface-variant focus:ring-0 p-0 resize-none" id="record-description" name="record-description" placeholder="Provide detailed description..." rows="4">Comprehensive review of Q3 compliance metrics across all operational units. Requires attention to recent policy updates.</textarea>
</div>
</div>
<!-- Grid for Status & Priority -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Status Field (with Validation Error) -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="record-status">Status</label>
<div class="rounded-DEFAULT flex items-center px-md py-sm input-surface border-error focus-within:border-error focus-within:ring-2 focus-within:ring-error focus-within:ring-opacity-50 transition-all duration-200">
<select class="bg-transparent border-none outline-none w-full font-body-md text-body-md text-on-surface focus:ring-0 p-0 appearance-none" id="record-status" name="record-status">
<option class="bg-surface-variant text-on-surface" value="pending">Pending</option>
<option class="bg-surface-variant text-on-surface" value="in_progress">In Progress</option>
<option class="bg-surface-variant text-on-surface" value="completed">Completed</option>
<option class="bg-surface-variant text-on-surface" selected="" value="blocked">Blocked</option>
</select>
<span class="material-symbols-outlined text-on-surface-variant pointer-events-none ml-2" data-icon="expand_more">expand_more</span>
</div>
<p class="font-body-sm text-body-sm text-error mt-unit flex items-center gap-unit">
<span class="material-symbols-outlined text-[16px]" data-icon="error">error</span>
                            Status cannot be 'Blocked' without an active dependency link.
                        </p>
</div>
<!-- Priority Field -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="record-priority">Priority</label>
<div class="input-focus rounded-DEFAULT flex items-center px-md py-sm input-surface transition-all duration-200">
<select class="bg-transparent border-none outline-none w-full font-body-md text-body-md text-on-surface focus:ring-0 p-0 appearance-none" id="record-priority" name="record-priority">
<option class="bg-surface-variant text-on-surface" value="low">Low</option>
<option class="bg-surface-variant text-on-surface" value="medium">Medium</option>
<option class="bg-surface-variant text-on-surface" selected="" value="high">High</option>
<option class="bg-surface-variant text-on-surface" value="critical">Critical</option>
</select>
<span class="material-symbols-outlined text-on-surface-variant pointer-events-none ml-2" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
</form>
<!-- Form Footer (Actions) -->
<div class="px-lg py-md border-t card-border flex items-center justify-end gap-md bg-surface-container-low">
<button class="font-title-sm text-title-sm text-on-surface px-lg py-sm rounded-DEFAULT border card-border hover:bg-surface-container-highest transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#0F172A] focus:ring-primary-container" type="button">
                    Cancel
                </button>
<button class="font-title-sm text-title-sm text-white bg-[#2563EB] px-lg py-sm rounded-DEFAULT hover:bg-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#0F172A] focus:ring-primary-container flex items-center gap-sm" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="save">save</span>
                    Save Changes
                </button>
</div>
</div>
</main>
</body></html>
